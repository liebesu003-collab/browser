name: Playwright Real Run

on:
  workflow_dispatch:
    inputs:
      runner_labels:
        description: 'JSON array of self-hosted runner labels, for example ["self-hosted","linux"]'
        required: true
        default: '["self-hosted","linux"]'
      run_count:
        description: "How many registration attempts to run (0 = infinite)"
        required: true
        default: "1"
      concurrency:
        description: "How many workers to run in parallel"
        required: true
        default: "1"
      headless:
        description: "Run Chromium headless on the self-hosted runner"
        required: true
        type: boolean
        default: false
      log_enabled:
        description: "Write detailed logs and upload them as artifacts"
        required: true
        type: boolean
        default: true
      use_subscription_proxy:
        description: "Fetch nodes from top100.txt and route traffic through a local sing-box proxy"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: playwright-real-${{ github.ref }}
  cancel-in-progress: false

jobs:
  real:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-real.txt

      - name: Install Chromium for Playwright on Linux
        if: runner.os == 'Linux'
        run: python -m playwright install --with-deps chromium

      - name: Install Chromium for Playwright on non-Linux
        if: runner.os != 'Linux'
        run: python -m playwright install chromium

      - name: Ensure xvfb-run is available
        if: runner.os == 'Linux'
        run: |
          if ! command -v xvfb-run >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y xvfb
            else
              echo "xvfb-run is required on Linux self-hosted runners; install xvfb before running this workflow."
              exit 1
            fi
          fi

      - name: Install sing-box on Linux
        if: runner.os == 'Linux' && inputs.use_subscription_proxy
        run: |
          SINGBOX_URL="$(python - <<'PY'
          import json
          import urllib.request

          api_url = "https://api.github.com/repos/SagerNet/sing-box/releases/latest"
          req = urllib.request.Request(
              api_url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "codex",
              },
          )
          release = json.load(urllib.request.urlopen(req, timeout=30))
          for asset in release["assets"]:
              name = asset["name"]
              if "linux-amd64" in name and name.endswith(".tar.gz"):
                  print(asset["browser_download_url"])
                  break
          else:
              raise SystemExit("No linux-amd64 sing-box release asset found")
          PY
          )"
          curl -fsSL "$SINGBOX_URL" -o /tmp/sing-box.tar.gz
          mkdir -p /tmp/sing-box
          tar -xzf /tmp/sing-box.tar.gz -C /tmp/sing-box --strip-components=1
          sudo install -m 0755 /tmp/sing-box/sing-box /usr/local/bin/sing-box
          sing-box version

      - name: Build config.json for self-hosted runner
        env:
          BASE_CONFIG_JSON: ${{ secrets.SMOKE_PLAYWRIGHT_CONFIG_JSON }}
          ACCOUNT_PASSWORD_SECRET: ${{ secrets.SMOKE_PLAYWRIGHT_ACCOUNT_PASSWORD }}
          TEMPMAIL_API_KEY_SECRET: ${{ secrets.SMOKE_PLAYWRIGHT_TEMPMAIL_API_KEY }}
          API_PROXY_SECRET: ${{ secrets.SMOKE_PLAYWRIGHT_API_PROXY }}
          BROWSER_PROXY_SECRET: ${{ secrets.SMOKE_PLAYWRIGHT_BROWSER_PROXY }}
          RUN_COUNT_INPUT: ${{ inputs.run_count }}
          CONCURRENCY_INPUT: ${{ inputs.concurrency }}
          HEADLESS_INPUT: ${{ inputs.headless }}
          LOG_ENABLED_INPUT: ${{ inputs.log_enabled }}
          RUNNER_OS_NAME: ${{ runner.os }}
          USE_SUBSCRIPTION_PROXY_INPUT: ${{ inputs.use_subscription_proxy }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ.get("BASE_CONFIG_JSON", "").strip()
          if not raw:
              raise SystemExit("Missing repository secret: SMOKE_PLAYWRIGHT_CONFIG_JSON")

          try:
              cfg = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"SMOKE_PLAYWRIGHT_CONFIG_JSON is not valid JSON: {exc}") from exc

          if not isinstance(cfg, dict):
              raise SystemExit("SMOKE_PLAYWRIGHT_CONFIG_JSON must decode to a JSON object")

          secret_overrides = {
              "account_password": os.environ.get("ACCOUNT_PASSWORD_SECRET", "").strip(),
              "tempmail_api_key": os.environ.get("TEMPMAIL_API_KEY_SECRET", "").strip(),
              "api_proxy": os.environ.get("API_PROXY_SECRET", "").strip(),
              "browser_proxy": os.environ.get("BROWSER_PROXY_SECRET", "").strip(),
          }
          for key, value in secret_overrides.items():
              if value:
                  cfg[key] = value

          cfg["run_count"] = int(os.environ["RUN_COUNT_INPUT"])
          cfg["concurrency"] = max(1, int(os.environ["CONCURRENCY_INPUT"]))
          cfg["headless"] = os.environ["HEADLESS_INPUT"].lower() == "true"
          cfg["log_enabled"] = os.environ["LOG_ENABLED_INPUT"].lower() == "true"
          use_subscription_proxy = os.environ["USE_SUBSCRIPTION_PROXY_INPUT"].lower() == "true"
          runner_os = os.environ.get("RUNNER_OS_NAME", "")

          cfg.setdefault("token_dir", "tokens")
          cfg.setdefault("log_dir", "logs")
          cfg.setdefault("virtualbrowser_profile_root", "profiles")
          cfg.setdefault("email_providers", ["tempmail", "mailtm"])
          cfg.setdefault("tempmail_timeout", 120)
          cfg.setdefault("proxy_subscription_url", "https://henryli777.github.io/google_ssr_actions/sub/top100.txt")
          cfg.setdefault("browser_locale", "en-US")
          cfg.setdefault("browser_timezone", "America/New_York")
          cfg.setdefault("browser_width", 1365)
          cfg.setdefault("browser_height", 900)

          # Linux and macOS self-hosted runners use Playwright Chromium by default.
          if runner_os != "Windows":
              cfg.pop("virtualbrowser_executable_path", None)

          if use_subscription_proxy and runner_os == "Linux":
              local_proxy = "http://127.0.0.1:7897"
              cfg["api_proxy"] = local_proxy
              cfg["browser_proxy"] = local_proxy

          required_dirs = [
              cfg["token_dir"],
              cfg["log_dir"],
              cfg["virtualbrowser_profile_root"],
          ]
          for directory in required_dirs:
              Path(directory).mkdir(parents=True, exist_ok=True)

          Path("config.json").write_text(
              json.dumps(cfg, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          print("config.json written for self-hosted runner")
          print(f"runner_os={runner_os}")
          print(f"run_count={cfg['run_count']}")
          print(f"concurrency={cfg['concurrency']}")
          print(f"headless={cfg['headless']}")
          print(f"log_enabled={cfg['log_enabled']}")
          PY

      - name: Build sing-box proxy config on Linux
        if: runner.os == 'Linux' && inputs.use_subscription_proxy
        run: |
          SUBSCRIPTION_URL="$(python - <<'PY'
          import json
          with open('config.json', 'r', encoding='utf-8') as f:
              cfg = json.load(f)
          print(cfg.get('proxy_subscription_url', 'https://henryli777.github.io/google_ssr_actions/sub/top100.txt'))
          PY
          )"
          python build_singbox_config.py \
            --subscription-url "$SUBSCRIPTION_URL" \
            --output sing-box-proxy.json \
            --listen-host 127.0.0.1 \
            --listen-port 7897 \
            --max-nodes 30 \
            --test-url 'https://chatgpt.com/auth/login_with'
          python -m json.tool sing-box-proxy.json > /dev/null
          sing-box check -D . -c sing-box-proxy.json

      - name: Start sing-box proxy on Linux
        if: runner.os == 'Linux' && inputs.use_subscription_proxy
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          cfg = json.loads(Path("sing-box-proxy.json").read_text(encoding="utf-8"))
          candidate_tags = [
              outbound["tag"]
              for outbound in cfg.get("outbounds", [])
              if outbound.get("type") not in {"urltest", "direct"}
          ]
          Path("sing-box-candidates.txt").write_text(
              "\n".join(candidate_tags) + "\n",
              encoding="utf-8",
          )
          print(f"candidate_count={len(candidate_tags)}")
          PY

          rm -f sing-box.pid selected-proxy-tag.txt sing-box-attempts.log

          check_https_status() {
            local url="$1"
            local status
            status="$(curl -sS --proxy http://127.0.0.1:7897 -o /dev/null -w '%{http_code}' "$url" --max-time 20 || true)"
            echo "status $url => $status"
            if [ -z "$status" ] || [ "$status" = "000" ] || [ "$status" = "407" ]; then
              return 1
            fi
            return 0
          }

          check_chatgpt_page() {
            local body_file
            local status
            body_file="$(mktemp)"
            status="$(curl -sS -L --proxy http://127.0.0.1:7897 -o "$body_file" -w '%{http_code}' https://chatgpt.com/auth/login_with --max-time 20 || true)"
            echo "status https://chatgpt.com/auth/login_with => $status"
            head -c 200 "$body_file" | tr '\n' ' ' || true
            echo

            if [ -z "$status" ] || [ "$status" = "000" ] || [ "$status" = "407" ]; then
              rm -f "$body_file"
              return 1
            fi

            if grep -qi 'Unable to load site' "$body_file" || grep -qi 'using a VPN' "$body_file"; then
              rm -f "$body_file"
              return 1
            fi

            rm -f "$body_file"
            return 0
          }

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "::group::Trying proxy node $tag"

            python - <<'PY' "$tag"
          import json
          import sys
          from pathlib import Path

          tag = sys.argv[1]
          cfg = json.loads(Path("sing-box-proxy.json").read_text(encoding="utf-8"))
          cfg.setdefault("route", {})["final"] = tag
          Path("sing-box-active.json").write_text(
              json.dumps(cfg, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          print(f"route.final={tag}")
          PY

            : > sing-box.log
            nohup sing-box run -D . -c sing-box-active.json > sing-box.log 2>&1 &
            echo $! > sing-box.pid
            sleep 6

            if ! kill -0 "$(cat sing-box.pid)" 2>/dev/null; then
              echo "sing-box failed to start for $tag" | tee -a sing-box-attempts.log
              cat sing-box.log | tee -a sing-box-attempts.log || true
              rm -f sing-box.pid
              echo "::endgroup::"
              continue
            fi

            if check_chatgpt_page \
              && check_https_status "https://auth.openai.com/"; then
              echo "$tag" | tee selected-proxy-tag.txt
              echo "Selected proxy node: $tag"
              echo "::endgroup::"
              break
            fi

            echo "Node failed validation: $tag" | tee -a sing-box-attempts.log
            cat sing-box.log | tee -a sing-box-attempts.log || true
            kill "$(cat sing-box.pid)" 2>/dev/null || true
            wait "$(cat sing-box.pid)" 2>/dev/null || true
            rm -f sing-box.pid
            echo "::endgroup::"
          done < sing-box-candidates.txt

          if [ ! -f selected-proxy-tag.txt ]; then
            echo "No proxy node passed ChatGPT/OpenAI validation"
            exit 1
          fi

      - name: Run full Playwright workflow on Linux
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1365x900x24 -ac +extension RANDR" \
            python smoke_playwright.py

      - name: Run full Playwright workflow on non-Linux
        if: runner.os != 'Linux'
        run: python smoke_playwright.py

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-real-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            logs/
            tokens/
            *.png
            sing-box.log
            sing-box-proxy.json
            sing-box-active.json
            sing-box-attempts.log
            selected-proxy-tag.txt
            proxy_rotation_state.json
